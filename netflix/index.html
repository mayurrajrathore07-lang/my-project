<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>netflix clone</title>
</head>
<body>
 <header>
    <nav class="navbar">
      <div class="navbar_netflix">
        <img src="image/Netflix_Logo_RGB.png" alt="Netflix">
  <div class="navbar_nav_items">
        <div class="nav_item">
          <div class="dropdown_container">
            <i class="fa fa-globe"></i>
            <select name="language" id="languageSelect" class="language_drop_down">
              <option value="english" selected>English</option>
              <option value="hind">Hindi</option>
            </select>
          </div>
        </div>
        <div class="nav_item">
          <button class="sign_in_button">Sign In</button>
        </div>
      </div>
    </nav>
  </header>
    
</body>
</html>
